version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - containedctx
    - contextcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - nakedret
    - nilerr
    - noctx
    - perfsprint
    - prealloc
    - staticcheck
    - unused
    - wastedassign
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests favor convenience over production-safety idioms:
      #   gosec    — file perms, dev-only http servers, jitter rand.
      #   noctx    — http.Get/NewRequest used for setup brevity.
      #   bodyclose — test handlers own body lifecycle inline.
      #   errorlint — panic-value comparisons are common in recover() tests.
      #   contextcheck/containedctx — tests legitimately pass context.Background.
      #   perfsprint — test setup is not on a hot path.
      - linters:
          - bodyclose
          - containedctx
          - contextcheck
          - errorlint
          - gosec
          - noctx
          - perfsprint
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
