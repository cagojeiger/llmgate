name: e2e (live upstream)

# Manual / monthly only — costs vendor credits and is non-deterministic.
# Set LLMGATE_OPENCODE_API_KEY and SLACK_WEBHOOK_URL as repo secrets. ADR 006.
on:
  workflow_dispatch:
  schedule:
    # 2nd of every month, 09:00 UTC — wire-drift sentinel.
    - cron: '0 9 2 * *'

permissions:
  contents: read

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: astral-sh/setup-uv@v3

      - name: make e2e
        env:
          LLMGATE_OPENCODE_API_KEY: ${{ secrets.LLMGATE_OPENCODE_API_KEY }}
        run: |
          if [ -z "$LLMGATE_OPENCODE_API_KEY" ]; then
            echo "::error::LLMGATE_OPENCODE_API_KEY secret is not set on this repo"
            exit 1
          fi
          make e2e

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          icon=":white_check_mark:"; [ "$STATUS" != "success" ] && icon=":x:"
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"${icon} llmgate e2e-live (${STATUS}) — ${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
