# Local-only compose for hand-testing the gateway in a container.
# Mounts catalog/ and consumers/ read-only so editing yaml in the repo
# flows through without rebuilding the image. .env at the repo root
# supplies provider API keys (loaded automatically by compose).
# consumers/ ships with example.yaml — see README "Caller registration".

services:
  llmgate:
    build: .
    image: llmgate:dev
    depends_on:
      - nats
    ports:
      - "8080:8080"
    environment:
      LLMGATE_OPENCODE_API_KEY: ${LLMGATE_OPENCODE_API_KEY}
      LLMGATE_OPENROUTER_API_KEY: ${LLMGATE_OPENROUTER_API_KEY:-}
      LLMGATE_CATALOG: /etc/llmgate/catalog
      LLMGATE_CONSUMERS: /etc/llmgate/consumers
      LLMGATE_LOG_LEVEL: info
      LLMGATE_NATS_URL: nats://nats:4222
      LLMGATE_NATS_STREAM: LLMGATE_LLM_RESULTS
      LLMGATE_NATS_SUBJECT: llmgate.llm.results.v1
      LLMGATE_NATS_WORKERS: 1
      LLMGATE_NATS_BATCH_SIZE: 100
      LLMGATE_NATS_BATCH_MAX_WAIT: 1s
    volumes:
      - ./catalog:/etc/llmgate/catalog:ro
      - ./consumers:/etc/llmgate/consumers:ro
    restart: "no"

  nats:
    image: nats:2.14.0-alpine
    command:
      - --jetstream
      - --store_dir=/data
      - --http_port=8222
    ports:
      - "${LLMGATE_NATS_PORT:-4222}:4222"
      - "${LLMGATE_NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    restart: "no"

  nats-box:
    image: natsio/nats-box:latest
    profiles:
      - tools
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222
    restart: "no"

  prometheus:
    image: prom/prometheus:v3.7.3
    depends_on:
      - llmgate
    ports:
      - "${LLMGATE_PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: "no"

  grafana:
    image: grafana/grafana:12.3.0
    depends_on:
      - prometheus
    ports:
      - "${LLMGATE_GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: "no"

volumes:
  nats-data:
