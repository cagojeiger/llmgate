name: e2e live

# Manual / monthly only — costs vendor credits and is non-deterministic.
# Set LLMGATE_OPENCODE_API_KEY and SLACK_WEBHOOK_URL as repo secrets. ADR 006.
on:
  workflow_dispatch:
  schedule:
    # 2nd of every month, 09:00 UTC — wire-drift sentinel.
    - cron: '0 9 2 * *'

permissions:
  contents: read

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'
          cache: true

      - uses: astral-sh/setup-uv@v8.3.2

      - name: Run pytest (live)
        id: e2e
        continue-on-error: true
        env:
          LLMGATE_OPENCODE_API_KEY: ${{ secrets.LLMGATE_OPENCODE_API_KEY }}
          LLMGATE_E2E_VENDOR: opencode
        run: |
          if [ -z "$LLMGATE_OPENCODE_API_KEY" ]; then
            echo "::error::LLMGATE_OPENCODE_API_KEY secret is not set on this repo"
            exit 1
          fi
          cd tests/e2e
          uv run pytest --junit-xml=results.xml

      - name: Summarize results
        id: summary
        if: always()
        run: |
          python3 - <<'PY'
          import os, xml.etree.ElementTree as ET
          out = open(os.environ['GITHUB_OUTPUT'], 'a')
          step = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')
          try:
              root = ET.parse('tests/e2e/results.xml').getroot()
          except FileNotFoundError:
              out.write("status=failure\n")
              out.write("summary=pytest did not produce a report (build/setup failure)\n")
              out.write("failed_list=\n")
              step.write("## e2e-live\n\nNo pytest report — see job log.\n")
              raise SystemExit(0)

          ts = root.find('testsuite') if root.tag == 'testsuites' else root
          total = int(ts.get('tests', 0))
          failures = int(ts.get('failures', 0))
          errors = int(ts.get('errors', 0))
          skipped = int(ts.get('skipped', 0))
          duration = float(ts.get('time', 0))
          passed = total - failures - errors - skipped
          status = "success" if (failures == 0 and errors == 0) else "failure"

          failed_names = []
          for tc in ts.iter('testcase'):
              if any(child.tag in ('failure', 'error') for child in tc):
                  cls = tc.get('classname', '').rsplit('.', 1)[-1]
                  name = tc.get('name', '?')
                  failed_names.append(f"{cls}::{name}" if cls else name)

          summary = f"{passed} passed, {failures + errors} failed, {skipped} skipped (total {total}, {duration:.0f}s)"
          out.write(f"status={status}\n")
          out.write(f"summary={summary}\n")
          out.write("failed_list<<EOF\n")
          for n in failed_names[:20]:
              out.write(f"• {n}\n")
          if len(failed_names) > 20:
              out.write(f"• ... and {len(failed_names) - 20} more\n")
          out.write("EOF\n")

          step.write(f"## e2e-live ({status})\n\n{summary}\n")
          if failed_names:
              step.write("\n### Failed\n")
              for n in failed_names:
                  step.write(f"- `{n}`\n")
          PY

      # Slack fires only when pytest failed — green runs stay silent. The
      # 'Run pytest' step has continue-on-error so we can't use failure() here;
      # the summary step's status output is the source of truth (also catches
      # the no-report build-failure path).
      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != '' && steps.summary.outputs.status != 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUMMARY: ${{ steps.summary.outputs.summary }}
          FAILED_LIST: ${{ steps.summary.outputs.failed_list }}
          TRIGGER: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NL=$'\n'
          text=":x: *llmgate e2e-live* — failed${NL}• trigger: ${TRIGGER} by ${ACTOR} (${BRANCH})${NL}• ${SUMMARY}"
          if [ -n "$FAILED_LIST" ]; then
            text="${text}${NL}*failed:*${NL}${FAILED_LIST}"
          fi
          text="${text}${NL}${RUN_URL}"
          jq -nc --arg t "$text" '{text:$t}' \
            | curl -fsS -X POST -H 'Content-Type: application/json' --data @- "$SLACK_WEBHOOK_URL"

      - name: Fail job if pytest failed
        if: always() && steps.summary.outputs.status != 'success'
        run: exit 1
