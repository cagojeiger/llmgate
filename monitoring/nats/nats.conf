# Local-only NATS server config that mirrors the prod account / user
# model from multi-cluster-gitops platform/nats/helm/values-oci-prod-osaka.yaml
# so docker compose exercises the same publish-only credential path
# (LLMGATE_LLMRESULT_NATS_USER / LLMGATE_LLMRESULT_NATS_PASSWORD).
#
# Passwords here are local-dev placeholders — never used in prod.

max_payload: 1MB

jetstream {
  store_dir: "/data/jetstream"
}

accounts {
  APP {
    jetstream: enabled
    users = [
      { user: nack,    password: "nack-local",    permissions: { publish: ">", subscribe: ">" } }
      { user: llmgate, password: "llmgate-local", permissions: {
          publish:   { allow: ["llmgate.llmresult.finalized"] }
          subscribe: { allow: ["_INBOX.>"] }
      } }
    ]
  }
}
