# Local-only compose for hand-testing the gateway in a container.
# Mounts catalog/ and consumers/ read-only so editing yaml in the repo
# flows through without rebuilding the image. .env at the repo root
# supplies provider API keys (loaded automatically by compose).
# consumers/ ships with example.yaml — see README "Caller registration".

services:
  llmgate:
    build: .
    image: llmgate:dev
    depends_on:
      nats:
        condition: service_started
      nats-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      LLMGATE_OPENCODE_API_KEY: ${LLMGATE_OPENCODE_API_KEY}
      LLMGATE_OPENROUTER_API_KEY: ${LLMGATE_OPENROUTER_API_KEY:-}
      LLMGATE_CATALOG: /etc/llmgate/catalog
      LLMGATE_CONSUMERS: /etc/llmgate/consumers
      LLMGATE_LOG_LEVEL: info
      LLMGATE_LLMRESULT_NATS_URL: ${LLMGATE_LLMRESULT_NATS_URL:-nats://nats:4222}
      LLMGATE_LLMRESULT_NATS_SUBJECT: ${LLMGATE_LLMRESULT_NATS_SUBJECT:-llmgate.llmresult.finalized}
      LLMGATE_LLMRESULT_ASYNC_QUEUE_SIZE: ${LLMGATE_LLMRESULT_ASYNC_QUEUE_SIZE:-1000}
      LLMGATE_LLMRESULT_ASYNC_BATCH_SIZE: ${LLMGATE_LLMRESULT_ASYNC_BATCH_SIZE:-100}
      LLMGATE_LLMRESULT_ASYNC_FLUSH_INTERVAL: ${LLMGATE_LLMRESULT_ASYNC_FLUSH_INTERVAL:-1s}
    volumes:
      - ./catalog:/etc/llmgate/catalog:ro
      - ./consumers:/etc/llmgate/consumers:ro
    restart: "no"

  nats:
    image: nats:2-alpine
    command:
      - "-js"
      - "-m"
      - "8222"
    ports:
      - "${LLMGATE_NATS_PORT:-4222}:4222"
      - "${LLMGATE_NATS_MONITOR_PORT:-8222}:8222"
    restart: "no"

  # Mirrors what NACK provisions in prod (see multi-cluster-gitops
  # platform/nats/manifests/oci-prod-osaka/stream.yaml). llmgate no
  # longer creates streams itself, so local stacks need this one-shot.
  nats-init:
    image: natsio/nats-box:0.18.0
    depends_on:
      - nats
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until nats --server nats://nats:4222 server check connection; do sleep 1; done &&
        nats --server nats://nats:4222 stream add LLMRESULT
        --subjects 'llmgate.llmresult.finalized'
        --storage file --retention limits --discard old
        --max-bytes=10737418240 --max-age=2160h --dupe-window=2m
        --max-msgs=-1 --max-msgs-per-subject=-1 --max-msg-size=-1
        --max-consumers=-1 --replicas 1 --no-allow-rollup --no-deny-delete --no-deny-purge --defaults
        || nats --server nats://nats:4222 stream info LLMRESULT

  prometheus:
    image: prom/prometheus:v3.7.3
    depends_on:
      - llmgate
    ports:
      - "${LLMGATE_PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: "no"

  grafana:
    image: grafana/grafana:12.3.0
    depends_on:
      - prometheus
    ports:
      - "${LLMGATE_GRAFANA_PORT:-3000}:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: "no"
