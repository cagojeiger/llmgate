vendor: opencode
base_url: https://opencode.ai/zen/go/v1
auth_env: LLMGATE_OPENCODE_API_KEY

protocols:
  openai:
    auth_scheme: bearer
    models:
      - id: glm-5.1
      - id: glm-5
      - id: kimi-k2.5
      - id: kimi-k2.6
      - id: deepseek-v4-pro
      - id: deepseek-v4-flash
      - id: mimo-v2-pro
      - id: mimo-v2-omni
      - id: mimo-v2.5-pro
      - id: mimo-v2.5
      - id: qwen3.6-plus
      - id: qwen3.5-plus

  anthropic:
    auth_scheme: x-api-key
    models:
      - id: minimax-m2.7
      - id: minimax-m2.5

aliases:
  coder:
    chain: [deepseek-v4-pro, deepseek-v4-flash, kimi-k2.6, glm-5.1]
  reasoning:
    chain: [minimax-m2.7, minimax-m2.5, deepseek-v4-pro]
  cheap-fast:
    chain: [deepseek-v4-flash, glm-5.1]

fallback:
  on_kinds: [rate_limit, upstream, timeout, network]
  circuit:
    failures_to_open: 3
    open_duration: 30s

defaults:
  model: deepseek-v4-flash
