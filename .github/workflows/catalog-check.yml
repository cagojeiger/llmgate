name: catalog drift check

# Five jobs, each with the smallest permission set its work actually needs:
#   detect       — read-only, runs the LLM agent, uploads manifest as artifact
#   apply-and-pr — writes catalog files and opens a PR (exit 1)
#   review-issue — opens a manual-review issue (exit 3)
#   notify       — pushes a Slack message reflecting whichever branch fired
#   fail-on-error — surfaces agent runtime errors (exit 2)
#
# Manifest flows between jobs as a 90-day GitHub artifact, so each job
# gets a fresh checkout/download and never inherits the agent's working
# tree. Step summary + artifact preserve the run's trace independently
# of Slack and PR.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'   # 매주 일요일 09:00 KST (UTC 00:00)

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      exit-code: ${{ steps.agent.outputs.exit }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r scripts/catalog_diff/requirements.txt

      - name: Run catalog-diff agent
        id: agent
        env:
          LLMGATE_CONSUMER_KEY: ${{ secrets.LLMGATE_CONSUMER_KEY }}
        run: |
          set +e
          python scripts/catalog_diff/main.py -v > manifest.yaml
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Show manifest in step summary
        run: |
          {
            echo "## Catalog drift manifest"
            echo
            echo '```yaml'
            cat manifest.yaml
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-output
          path: manifest.yaml
          retention-days: 90

  apply-and-pr:
    needs: detect
    if: needs.detect.outputs.exit-code == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr-number: ${{ steps.pr.outputs.pull-request-number }}
      pr-url: ${{ steps.pr.outputs.pull-request-url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml ruamel.yaml

      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Apply manifest
        run: python scripts/catalog_diff/apply.py manifest.yaml

      - name: Create or update PR
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/catalog-drift
          delete-branch: true
          title: "chore(catalog): auto-sync with opencode docs"
          body-path: pr-body.md
          commit-message: "chore(catalog): auto-sync with opencode docs"
          add-paths: catalog/

  review-issue:
    needs: detect
    if: needs.detect.outputs.exit-code == '3'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      issues: write
    outputs:
      url: ${{ steps.issue.outputs.url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Create review issue
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "Auto-detected drift requires manual review. See manifest below."
            echo
            echo '```yaml'
            cat manifest.yaml
            echo '```'
          } > issue-body.md
          url=$(gh issue create \
            --repo "$REPO" \
            --title "catalog drift needs manual review" \
            --body-file issue-body.md)
          echo "url=$url" >> "$GITHUB_OUTPUT"

  notify:
    needs: [detect, apply-and-pr, review-issue]
    # Slack fires on every non-zero exit (1 = PR opened, 2 = agent crashed,
    # 3 = needs manual review). Exit 0 = no drift = silent. always() is
    # required so the job runs even when apply-and-pr / review-issue were
    # skipped due to their own conditional gates.
    if: always() && needs.detect.outputs.exit-code != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pyyaml

      - uses: actions/download-artifact@v4
        with:
          name: agent-output

      - name: Notify Slack
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EXIT_CODE: ${{ needs.detect.outputs.exit-code }}
          APPLY_RESULT: ${{ needs.apply-and-pr.result }}
          PR_URL: ${{ needs.apply-and-pr.outputs.pr-url }}
          PR_NUM: ${{ needs.apply-and-pr.outputs.pr-number }}
          ISSUE_URL: ${{ needs.review-issue.outputs.url }}
          TRIGGER: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NL=$'\n'
          case "$EXIT_CODE" in
            1)
              if [ "$APPLY_RESULT" != "success" ] || [ -z "$PR_URL" ]; then
                # Drift was detected but apply-and-pr never produced a PR — peter-evans
                # failure, permissions issue, or no-op diff after apply. Surface as red.
                text=":x: *llmgate catalog drift* — detected but PR creation failed${NL}• trigger: ${TRIGGER} by ${ACTOR}${NL}• apply-and-pr result: ${APPLY_RESULT:-unknown}${NL}${RUN_URL}"
              else
                n=$(python3 -c "import yaml; print(yaml.safe_load(open('manifest.yaml'))['summary']['action_count'])")
                w=$(python3 -c "import yaml; print(yaml.safe_load(open('manifest.yaml'))['summary']['warning_count'])")
                text=":white_check_mark: *llmgate catalog drift* — PR opened${NL}• trigger: ${TRIGGER} by ${ACTOR}${NL}• ${n} actions, ${w} warnings${NL}• <${PR_URL}|PR #${PR_NUM}>${NL}${RUN_URL}"
              fi
              ;;
            2)
              text=":x: *llmgate catalog drift* — agent runtime error${NL}• trigger: ${TRIGGER} by ${ACTOR}${NL}${RUN_URL}"
              ;;
            3)
              text=":warning: *llmgate catalog drift* — needs manual review${NL}• trigger: ${TRIGGER} by ${ACTOR}${NL}• warnings detected${NL}• <${ISSUE_URL}|review issue>${NL}${RUN_URL}"
              ;;
            *)
              text=":grey_question: *llmgate catalog drift* — unexpected exit ${EXIT_CODE:-empty}${NL}${RUN_URL}"
              ;;
          esac
          jq -nc --arg t "$text" '{text:$t}' \
            | curl -fsS -X POST -H 'Content-Type: application/json' --data @- "$SLACK_WEBHOOK_URL"

  # Keep the workflow run red on agent runtime errors so branch protection /
  # the Actions tab status reflect reality even if Slack is silent (no webhook).
  fail-on-error:
    needs: detect
    if: needs.detect.outputs.exit-code == '2'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Surface runtime error
        run: |
          echo "agent runtime error (exit 2)" >&2
          exit 1
